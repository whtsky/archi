name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /usr/local/lib
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install libarchive build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev libacl1-dev libbz2-dev liblzma-dev libzip-dev liblz4-dev libzstd-dev lzop

      - name: Download and build libarchive
        run: |
          bash ci/download_libarchive.sh
          sudo bash ci/build_libarchive.sh
          sudo ldconfig

      - name: Install and test
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r dev-requirements.txt
          pip install -e .
          pytest --cov --cov-report=xml --cov-report=term-missing

  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download libarchive source
        run: bash ci/download_libarchive.sh

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: pypa/cibuildwheel@v2
        env:
          CIBW_ENVIRONMENT_MACOS: >-
            LDFLAGS="-L$(brew --prefix libarchive)/lib"
            CPPFLAGS="-I$(brew --prefix libarchive)/include"
            PKG_CONFIG_PATH="$(brew --prefix libarchive)/lib/pkgconfig"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: |
          pip install build Cython
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
