name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /usr/local/lib
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install libarchive build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev libacl1-dev libbz2-dev liblzma-dev libzip-dev liblz4-dev libzstd-dev lzop

      - name: Download and build libarchive
        run: |
          bash ci/download_libarchive.sh
          sudo bash ci/build_libarchive.sh
          sudo ldconfig

      - name: Install and test
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt -r dev-requirements.txt
          pip install -e . --no-build-isolation
          pytest --cov --cov-report=xml --cov-report=term-missing

  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download libarchive source (non-Windows)
        if: runner.os != 'Windows'
        run: bash ci/download_libarchive.sh

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install libarchive via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libarchive:x64-windows
          echo "INCLUDE=$VCPKG_INSTALLATION_ROOT\installed\x64-windows\include;$env:INCLUDE" >> $env:GITHUB_ENV
          echo "LIB=$VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib;$env:LIB" >> $env:GITHUB_ENV
          echo "$VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin" >> $env:GITHUB_PATH

      - uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ENVIRONMENT_MACOS: >-
            LDFLAGS="-L$(brew --prefix libarchive)/lib"
            CPPFLAGS="-I$(brew --prefix libarchive)/include"
            PKG_CONFIG_PATH="$(brew --prefix libarchive)/lib/pkgconfig"
          CIBW_ENVIRONMENT_WINDOWS: >-
            INCLUDE="C:\\vcpkg\\installed\\x64-windows\\include"
            LIB="C:\\vcpkg\\installed\\x64-windows\\lib"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} --add-path C:\\vcpkg\\installed\\x64-windows\\bin {wheel}"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: |
          pip install build Cython
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
