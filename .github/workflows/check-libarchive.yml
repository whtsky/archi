name: Check libarchive releases

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new libarchive release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/libarchive/libarchive/releases/latest --jq '.tag_name')
          CURRENT=$(cat LIBARCHIVE_VERSION | tr -d '[:space:]')

          echo "Latest: $LATEST, Current: $CURRENT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already up to date"
            exit 0
          fi

          VERSION="${LATEST#v}"

          echo "$LATEST" > LIBARCHIVE_VERSION
          sed -i "s/version=\".*\"/version=\"$VERSION\"/" setup.py

          # Prepend new entry to CHANGELOG.md after the header
          sed -i "/^# Changelog/a\\\\n## v${VERSION}\n\n- (wheels) Upgrade bundled libarchive to [${LATEST}](https://github.com/libarchive/libarchive/releases/tag/${LATEST})" CHANGELOG.md

          BRANCH="bump-libarchive-${LATEST}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add LIBARCHIVE_VERSION setup.py CHANGELOG.md
          git commit -m "chore: bump libarchive to ${LATEST}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump libarchive to ${LATEST}" \
            --body "Automated PR to update bundled libarchive from ${CURRENT} to ${LATEST}.

          Release notes: https://github.com/libarchive/libarchive/releases/tag/${LATEST}" \
            --base master
