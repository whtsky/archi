name: Check libarchive releases

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new libarchive release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh api repos/libarchive/libarchive/releases/latest --jq '.tag_name')
          CURRENT=$(grep 'git checkout' ci/download_libarchive.sh | sed 's/.*git checkout //' | tr -d '[:space:]')

          echo "Latest: $LATEST, Current: $CURRENT"

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Already up to date"
            exit 0
          fi

          VERSION="${LATEST#v}"

          sed -i "s/git checkout .*/git checkout $LATEST/" ci/download_libarchive.sh
          sed -i "s/version=\".*\"/version=\"$VERSION\"/" setup.py
          sed -i "/^## Changelog/a\\\\n### v${VERSION}\n\n- (wheels) Upgrade bundled libarchive to [${LATEST}](https://github.com/libarchive/libarchive/releases/tag/${LATEST})" README.md

          BRANCH="bump-libarchive-${LATEST}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ci/download_libarchive.sh setup.py README.md
          git commit -m "chore: bump libarchive to ${LATEST}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump libarchive to ${LATEST}" \
            --body "Automated PR to update bundled libarchive from ${CURRENT} to ${LATEST}.

          Release notes: https://github.com/libarchive/libarchive/releases/tag/${LATEST}" \
            --base master
